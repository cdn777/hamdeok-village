<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 일정 — 창경빌리지 602호</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0FAF8;
  --surface: #FFFFFF;
  --border: #C8EAE4;
  --text: #0F2B27;
  --muted: #5A8A82;
  --accent: #1A8A78;
  --accent-light: #D4F2ED;
  --accent2: #0D6B5C;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* LOCK SCREEN */
.lock-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.pw-form {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  max-width: 340px;
  width: 90%;
  text-align: center;
}
.pw-form .lock-icon {
  font-size: 2rem;
  margin-bottom: 1rem;
}
.pw-form h2 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.4rem;
}
.pw-form p {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
}
.pw-form input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  background: var(--bg);
  outline: none;
  text-align: center;
  letter-spacing: 0.15em;
  margin-bottom: 0.75rem;
}
.pw-form input:focus { border-color: var(--accent); }
.pw-form button {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0.65rem;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}
.pw-form button:hover { background: var(--accent2); }
.pw-error {
  font-size: 0.78rem;
  color: #e05555;
  margin-top: 0.5rem;
  display: none;
}

/* TOP BAR */
.top-bar {
  background: rgba(240,250,248,0.97);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: var(--accent);
  font-size: 0.875rem;
  font-weight: 500;
}

.back-btn svg {
  flex-shrink: 0;
}

.top-title {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
}

/* CONTENT */
.content {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.25rem 3rem;
}

.page-title {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.4rem;
}

.page-desc {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}

/* CALENDAR WRAPPER */
.cal-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  width: 100%;
  /* 16:10 aspect ratio for calendar */
  position: relative;
  padding-bottom: 120%;
}

.cal-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.cal-note {
  margin-top: 1rem;
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <div class="pw-form">
    <div class="lock-icon">🔒</div>
    <h2>비밀번호를 입력해주세요</h2>
    <p>창경빌리지 602호 안내 페이지</p>
    <input type="password" id="pw-input" placeholder="••••••••" maxlength="20" />
    <button onclick="checkPW()">확인</button>
    <div class="pw-error" id="pw-error">비밀번호가 맞지 않아요</div>
  </div>
</div>

<div id="main" style="display:none;">

<div class="top-bar">
  <a class="back-btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    돌아가기
  </a>
  <div class="top-title">창경빌리지 602호</div>
</div>

<div class="content">
  <div class="page-title">예약 일정</div>
  <div class="page-desc">색칠된 구간은 이미 예약된 기간이에요. 빈 날짜로 방문 일정을 잡고, 일정이 정해지면 연락주세요! 😊</div>

  <div class="cal-wrap">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=vpq30rn93cvk8jbhbcsao8t59o%40group.calendar.google.com&ctz=Asia%2FSeoul&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&mode=MONTH"
      frameborder="0"
      scrolling="no"
      allowfullscreen>
    </iframe>
  </div>

</div>

</div><!-- /#main -->

<script>
const PASSWORD = '123456';

function checkPW() {
  const v = document.getElementById('pw-input').value;
  if (v === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    localStorage.setItem('jeju_cal_auth', '1');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPW();
});

if (localStorage.getItem('jeju_cal_auth') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}
</script>

</body>
</html>
